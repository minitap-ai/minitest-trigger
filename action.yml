name: 'Trigger Minitest Suite'
description: 'Trigger your Minitest suite from your CI workflow. Authenticates via GitHub OIDC, optionally uploads build artifacts, and kicks off test execution.'
author: 'Minitap'
branding:
  icon: 'play-circle'
  color: 'purple'

inputs:
  app-slug:
    description: 'The Minitest app slug to test'
    required: true
  user-story-types:
    description: 'Comma-separated user story types to run (e.g., "login,checkout"). Mutually exclusive with `user-stories`.'
    required: false
  user-stories:
    description: 'User story IDs (UUIDs) to run, separated by newlines and/or commas. Mutually exclusive with `user-story-types`.'
    required: false
  run-ios:
    description: 'Run tests on iOS. When true and no `ios-build-path` is provided, Minitest builds the app for you. Defaults to true.'
    required: false
    default: 'true'
  run-android:
    description: 'Run tests on Android. When true and no `android-build-path` is provided, Minitest builds the app for you. Defaults to true.'
    required: false
    default: 'true'
  ios-build-path:
    description: 'Optional path to a pre-built iOS simulator build (.app directory or .ipa file). When omitted with `run-ios: true`, Minitest builds the app.'
    required: false
  android-build-path:
    description: 'Optional path to a pre-built Android emulator build (.apk, must target x86-64). When omitted with `run-android: true`, Minitest builds the app.'
    required: false
  run-web:
    description: 'Run the web lane using the app''s configured default web targets. Defaults to false.'
    required: false
    default: 'false'
  web-targets:
    description: 'Explicit web targets as a comma-separated list of `<browser>:<viewport>` (e.g. "chrome:desktop,safari:mobile"). Valid: chrome:desktop, firefox:desktop, chrome:tablet, firefox:tablet, chrome:mobile (Android), safari:mobile (iOS). Enables the web lane on its own.'
    required: false
  web-url:
    description: 'Per-run web URL override (e.g. a PR preview deployment). Applies when run-web or web-targets is set.'
    required: false
  commit-title:
    description: 'Commit title (first line of the commit message). Auto-detected from the GitHub event payload if not provided.'
    required: false
  tenant-id:
    description: 'Tenant ID (required if repo is linked to multiple tenants)'
    required: false
  api-url:
    description: 'Override API base URL'
    required: false
    default: 'https://testing-service.app.minitap.ai'
  cancel-previous-runs:
    description: 'Cancel previous in-flight test batches for the same source branch when it matches the app''s release branch patterns. Has no effect on tag pushes or on branches that don''t match a configured release pattern.'
    required: false
    default: 'true'

outputs:
  batch-id:
    description: 'The ID of the triggered test batch'
  status:
    description: 'Initial status of the triggered batch'

runs:
  using: 'node20'
  main: 'dist/index.js'
