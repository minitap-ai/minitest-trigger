name: 'Trigger Minitest Suite'
description: 'Trigger your Minitest suite from your CI workflow. Authenticates via GitHub OIDC, optionally uploads build artifacts, and kicks off test execution.'
author: 'Minitap'
branding:
  icon: 'play-circle'
  color: 'purple'

inputs:
  app-slug:
    description: 'The Minitest app slug to test'
    required: true
  user-story-types:
    description: 'Comma-separated user story types to run (e.g., "login,checkout").'
    required: false
  ios-build-path:
    description: 'Path to the iOS simulator build (.app directory or .ipa file)'
    required: false
  android-build-path:
    description: 'Path to the Android emulator build (.apk, must target x86-64)'
    required: false
  commit-title:
    description: 'Commit title (first line of the commit message). Auto-detected from the GitHub event payload if not provided.'
    required: false
  tenant-id:
    description: 'Tenant ID (required if repo is linked to multiple tenants)'
    required: false
  api-url:
    description: 'Override API base URL'
    required: false
    default: 'https://testing-service.app.minitap.ai'

outputs:
  batch-id:
    description: 'The ID of the triggered test batch'
  status:
    description: 'Initial status of the triggered batch'

runs:
  using: 'node20'
  main: 'dist/index.js'
